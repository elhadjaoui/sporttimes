services:
  - type: web
    name: sporttimes
    runtime: node
    plan: starter
    region: frankfurt
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Force npm to install devDependencies during build.
      # Without this, Render's default NODE_ENV=production skips
      # tailwindcss, postcss, autoprefixer, typescript, @types/*
      # and the next build fails with "Cannot find module 'tailwindcss'".
      - key: NPM_CONFIG_PRODUCTION
        value: "false"
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
    healthCheckPath: /
